<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planos - Xixa Marketing</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .plano { background: white; border-radius: 15px; padding: 30px; margin: 20px auto; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { background: #ff00ff; color: white; padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h1 style="text-align:center;">Escolha seu Plano</h1>
    
    <div class="plano">
        <h2>Básico</h2>
        <h3>R$ 2,00</h3>
        <ul>
            <li>4 conteúdos exclusivos</li>
            <li>Acesso por 7 dias</li>
        </ul>
        <button onclick="alert('Redirecionando para pagamento...')">Comprar por R$2</button>
    </div>

    <div class="plano">
        <h2>Premium</h2>
        <h3>R$ 30,00</h3>
        <ul>
            <li>+15 conteúdos premium</li>
            <li>Acesso ilimitado</li>
            <li>Suporte prioritário</li>
        </ul>
        <button onclick="alert('Redirecionando para pagamento...')">Comprar por R$30</button>
    </div>
</body>
</html>
