<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xixa Marketing - Página de Fofoca</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #000; color: white; padding: 20px; text-align: center; }
        .planos { display: flex; justify-content: center; gap: 20px; margin: 50px; }
        .plano { border: 1px solid #ddd; padding: 20px; border-radius: 10px; width: 300px; text-align: center; }
        button { background: #ff00ff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <h1>🌟 Xixa Marketing - Fofoca Premium</h1>
        <p>Planos exclusivos de conteúdo</p>
    </header>

    <div class="planos">
        <div class="plano">
            <h2>Básico</h2>
            <p>R$ 2,00</p>
            <ul>
                <li>4 fofocas</li>
            </ul>
            <button onclick="alert('Pagamento em breve')">Comprar</button>
        </div>
        <div class="plano">
            <h2>Premium</h2>
            <p>R$ 30,00</p>
            <ul>
                <li>+15 conteúdos exclusivos</li>
            </ul>
            <button onclick="alert('Pagamento em breve')">Comprar</button>
        </div>
    </div>
</body>
</html>
